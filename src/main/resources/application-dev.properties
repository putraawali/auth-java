spring.application.name=auth
spring.datasource.url=jdbc:postgresql://localhost:5432/auth
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret-key=secret-key-for-jwt-auth-application-java
# store in minutes, 15 minutes = 900000 ms
jwt.access-token-expiration=15
# store in minutes, 14 days = 20160 minutes
jwt.refresh-token-expiration=20160