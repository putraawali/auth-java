version: "3.9"

services:
    app:
        build: .
        container_name: auth-app
        ports:
            - "8080:8080"
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/auth_db
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: postgres
            JWT_SECRET: secret-key-for-jwt-auth-application-java
        depends_on:
            - db
        networks:
            - auth-network

    db:
        image: postgres:16
        container_name: auth-db
        restart: always
        environment:
            POSTGRES_DB: auth_db
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        networks:
            - auth-network

volumes:
    pgdata:

networks:
    auth-network:
